version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: voice_assistant_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: voice_assistant_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongodb_data:
  redis_data:
