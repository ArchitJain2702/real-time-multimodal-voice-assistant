name: voice_assistant_flutter
description: "Real-Time Multimodal Voice Assistant Flutter Client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Audio Capture & Playback
  record: 6.0.0
  just_audio: ^0.9.40
  
  # Network & Websockets
  web_socket_channel: ^3.0.1
  dio: ^5.5.0
  
  # State Management & DI
  flutter_riverpod: ^2.5.1
  
  # Navigation & Storage
  go_router: ^14.2.1
  flutter_secure_storage: ^9.2.2

  # Code Generation Annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation Tools
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.9.0
  
  # Testing Mocks
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
